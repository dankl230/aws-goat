name: 'Terraform Destroy'

on:
  workflow_dispatch:
    inputs:
      module:
        type: choice
        description: "Select which module to destroy"
        options: 
        - module-1
        - module-2
        required: true

permissions: write-all

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "us-east-1"

    defaults:
      run:
        shell: bash

    steps:
    
    # Checkout repository
    - name: Checkout
      uses: actions/checkout@v3

    # Install Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # Get AWS Account ID
    - name: Set Account ID
      id: account
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_OUTPUT

    # Retrieve terraform state file
    - name: Retrieve tfstate
      run: |
        cd modules/${{ github.event.inputs.module }}
        aws s3 cp s3://do-not-delete-awsgoat-state-files-${{ steps.account.outputs.ACCOUNT_ID }}/terraform.tfstate ./terraform.tfstate

    # Initialize Terraform
    - name: Terraform Init
      run: |
        cd modules/${{ github.event.inputs.module }}
        terraform init

    # Destroy infrastructure
    - name: Terraform Destroy
      run: |
        cd modules/${{ github.event.inputs.module }}
        terraform destroy -auto-approve -input=false
